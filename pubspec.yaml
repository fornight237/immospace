name: immospace_app
description: "ImmoSpace – Visite Immobilière Immersive en Réalité Augmentée et Réalité Virtuelle | ICT218 – UY1 ICT4D"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # ── Gestion d'état ─────────────────────────────────────────────────────────
  provider: ^6.1.1
  flutter_bloc: ^8.1.4

  # ── Réalité Virtuelle 360° ─────────────────────────────────────────────────
  panorama_viewer_plus: ^0.1.2

  # ── Réalité Augmentée ──────────────────────────────────────────────────────
  ar_flutter_plugin: ^0.7.3

  # ── Visualisation 3D ───────────────────────────────────────────────────────
  model_viewer_plus: ^1.7.0

  # ── Images & cache ─────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── Permissions (caméra, capteurs) ─────────────────────────────────────────
  permission_handler: 10.4.5

  # ── Capteurs (gyroscope pour RV) ───────────────────────────────────────────
  sensors_plus: ^5.0.1

  # ── Stockage local léger ───────────────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── UI ─────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # ── Assets (Dev5) ──────────────────────────────────────────────────────────
  assets:
    - assets/images/
    - assets/panoramas/
    - assets/models_3d/
    - assets/icons/
    - assets/data/

  # ── Polices (Dev5) ─────────────────────────────────────────────────────────
